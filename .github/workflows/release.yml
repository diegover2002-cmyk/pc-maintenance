name: Release

on:
  push:
    tags:
      - 'v*.*.*'

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Extract CHANGELOG entry for this version
        id: changelog
        shell: pwsh
        run: |
          $tag     = "${{ github.ref_name }}"
          $version = $tag -replace '^v', ''
          $content = Get-Content CHANGELOG.md -Raw
          $pattern = "(?s)## \[$([regex]::Escape($version))\].*?(?=\n## \[|\z)"
          $match   = [regex]::Match($content, $pattern)
          $notes   = if ($match.Success) { $match.Value.Trim() } else { "See CHANGELOG.md for details." }
          $notes | Set-Content release_notes.md -Encoding UTF8
          Write-Host "Release notes extracted for $version"

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: release_notes.md
          files: scripts/maintenance.ps1
          tag_name: ${{ github.ref_name }}
          draft: false
          prerelease: false
