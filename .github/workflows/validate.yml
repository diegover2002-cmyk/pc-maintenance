name: Validate PowerShell

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  validate:
    name: Lint & syntax check
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install PSScriptAnalyzer
        shell: pwsh
        run: Install-Module -Name PSScriptAnalyzer -Force -Scope CurrentUser -ErrorAction Stop

      - name: Syntax check
        shell: pwsh
        run: |
          $anyError = $false
          foreach ($f in Get-ChildItem ./scripts/*.ps1) {
            $tokens = $null; $errs = $null
            [System.Management.Automation.Language.Parser]::ParseFile(
              $f.FullName, [ref]$tokens, [ref]$errs
            ) | Out-Null
            if ($errs.Count -gt 0) {
              Write-Error "Syntax errors in $($f.Name):"
              $errs | ForEach-Object { Write-Error "  $_" }
              $anyError = $true
            } else {
              Write-Host "Syntax OK: $($f.Name)"
            }
          }
          if ($anyError) { exit 1 }

      - name: PSScriptAnalyzer
        shell: pwsh
        run: |
          $results = Invoke-ScriptAnalyzer `
            -Path ./scripts/ `
            -Recurse `
            -Severity Warning,Error `
            -ExcludeRule PSAvoidUsingWriteHost,PSAvoidUsingWMICmdlet,PSUseShouldProcessForStateChangingFunctions
          if ($results.Count -gt 0) {
            $results | Format-Table RuleName, Severity, Message, ScriptName, Line -AutoSize
            $errors = @($results | Where-Object { $_.Severity -eq 'Error' })
            if ($errors.Count -gt 0) {
              Write-Host "::error::PSScriptAnalyzer found $($errors.Count) error(s)" -ForegroundColor Red
              exit 1
            }
            Write-Host "PSScriptAnalyzer: $($results.Count) warning(s) found (no errors)." -ForegroundColor Yellow
          } else {
            Write-Host "PSScriptAnalyzer: no issues found." -ForegroundColor Green
          }
